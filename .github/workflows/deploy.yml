name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          envs: GH_TOKEN,ENV_FILE,GOOGLE_CREDENTIALS_JSON
          script: |
            set -e
            DEPLOY_DIR="/opt/neurobot"

            # Strip newlines from token
            GH_TOKEN=$(echo "$GH_TOKEN" | tr -d '\n\r')

            # First deploy: clone. Next deploys: pull.
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              git clone "https://${GH_TOKEN}@github.com/Gueriero/neurobot.git" "$DEPLOY_DIR"
            else
              cd "$DEPLOY_DIR"
              git remote set-url origin "https://${GH_TOKEN}@github.com/Gueriero/neurobot.git"
              git pull origin main
            fi

            cd "$DEPLOY_DIR"

            # Write .env from secret
            printf '%s\n' "$ENV_FILE" > .env

            # Write Google credentials from secret
            printf '%s\n' "$GOOGLE_CREDENTIALS_JSON" > credentials.json

            # Install Docker if missing
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | sh
            fi

            # Rebuild and restart
            docker compose down 2>/dev/null || true
            docker compose up -d --build

            echo "=== Deploy complete ==="
            docker compose ps
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          ENV_FILE: ${{ secrets.ENV_FILE }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
