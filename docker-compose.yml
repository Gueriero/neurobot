services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-wb_tracker}
      POSTGRES_USER: ${DB_USER:-cardgit}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cardgit_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cardgit} -d ${DB_NAME:-wb_tracker}"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - TZ=Europe/Moscow
    volumes:
      - ./credentials.json:/app/credentials.json:ro
      - logs:/var/log

volumes:
  pgdata:
  logs:
